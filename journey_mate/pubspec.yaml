name: journey_mate
description: JourneyMate — restaurant discovery app for travellers with dietary needs.
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.2.1

  # Navigation
  go_router: ^17.1.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.4

  # Network
  http: ^1.6.0

  # UI
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  auto_size_text: ^3.0.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  font_awesome_flutter: ^10.12.0
  page_transition: ^2.2.1
  scrollable_positioned_list: ^0.3.8
  visibility_detector: ^0.4.0+2
  expandable: ^5.0.1

  # Location
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  map_launcher: ^4.4.3
  google_maps_flutter: ^2.10.0

  # Utilities
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  intl: ^0.20.2
  easy_debounce: ^2.0.3
  timeago: ^3.7.1
  equatable: ^2.0.8
  collection: ^1.19.1
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/app_icon.png

# App icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true  # iOS doesn't support transparency in app icons
  background_color_ios: "#F5F1E8"  # Warm beige background for iOS
