name: journey_mate
description: JourneyMate — restaurant discovery app for travellers with dietary needs.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.4

  # Network
  http: ^1.6.0

  # UI
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  auto_size_text: ^3.0.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  font_awesome_flutter: ^10.12.0
  page_transition: ^2.2.1
  scrollable_positioned_list: ^0.3.8
  visibility_detector: ^0.4.0+2
  expandable: ^5.0.1

  # Location
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  map_launcher: ^4.4.3

  # Utilities
  url_launcher: ^6.3.2
  intl: ^0.20.2
  easy_debounce: ^2.0.3
  timeago: ^3.7.1
  equatable: ^2.0.8
  collection: ^1.19.1
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
