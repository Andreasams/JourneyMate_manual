name: journey_mate
description: JourneyMate — restaurant discovery app for travellers with dietary needs.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: 12.1.3

  # Storage
  flutter_secure_storage: 10.0.0-beta.4
  shared_preferences: 2.5.3

  # Network
  http: 1.4.0

  # UI
  google_fonts: 6.3.3
  flutter_animate: 4.5.0
  auto_size_text: 3.0.0
  cached_network_image: 3.4.1
  shimmer: ^3.0.0
  font_awesome_flutter: 10.7.0
  page_transition: 2.1.0
  scrollable_positioned_list: ^0.3.8
  visibility_detector: ^0.4.0+2
  expandable: 5.0.1

  # Location
  geolocator: 14.0.1
  permission_handler: ^12.0.1
  map_launcher: 3.5.0

  # Utilities
  url_launcher: 6.3.1
  intl: 0.20.2
  easy_debounce: 2.0.1
  timeago: 3.7.1
  equatable: 2.0.7
  collection: 1.19.1

  cupertino_icons: ^1.0.8

dependency_overrides:
  http: 1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
