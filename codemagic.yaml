workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: dk.journeymate.journeymate
      vars:
        BUNDLE_ID: "dk.journeymate.journeymate"
        XCODE_SCHEME: "Runner"
    scripts:
      - name: Set up Flutter
        script: |
          flutter precache --ios
      - name: Get Flutter dependencies
        script: |
          cd journey_mate
          flutter pub get
      - name: Generate iOS configuration
        script: |
          cd journey_mate
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods dependencies
        script: |
          cd journey_mate/ios
          pod install
      - name: Flutter analyze
        script: |
          cd journey_mate
          flutter analyze
      - name: Set build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID")
          NEXT=$((LATEST + 1))
          cd journey_mate/ios
          agvtool new-version -all $NEXT
      - name: Build iOS app
        script: |
          cd journey_mate
          flutter build ios --release --no-codesign
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
    artifacts:
      - journey_mate/build/ios/ipa/*.ipa
      - journey_mate/build/ios/archive/*.xcarchive
    publishing:
      email:
        recipients:
          - andreasstrandgaard@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
